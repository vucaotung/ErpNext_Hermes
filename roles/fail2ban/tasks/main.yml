---
# Protects the Hermes dashboard's password-login endpoint from brute-force
# attempts now that it's reachable via HTTPS from the public internet (see
# roles/caddy). Added 2026-07-24 alongside the switch away from an
# IP-whitelisted firewall rule. Reads Caddy's JSON access log for the
# dashboard site block, not the dashboard process's own log (hermes-serve
# doesn't log per-request client IPs to a file on its own).

- name: Install fail2ban
  ansible.builtin.apt:
    name: fail2ban
    state: present
    update_cache: true
  when: hermes_dashboard_domain is defined and hermes_dashboard_domain

- name: Render Hermes dashboard fail2ban filter
  ansible.builtin.template:
    src: hermes-dashboard.filter.j2
    dest: /etc/fail2ban/filter.d/hermes-dashboard.conf
    owner: root
    group: root
    mode: "0644"
  when: hermes_dashboard_domain is defined and hermes_dashboard_domain
  notify: Restart fail2ban

- name: Render Hermes dashboard fail2ban jail
  ansible.builtin.template:
    src: hermes-dashboard.jail.j2
    dest: /etc/fail2ban/jail.d/hermes-dashboard.conf
    owner: root
    group: root
    mode: "0644"
  when: hermes_dashboard_domain is defined and hermes_dashboard_domain
  notify: Restart fail2ban

- name: Enable and start fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    enabled: true
    state: started
  when: hermes_dashboard_domain is defined and hermes_dashboard_domain
