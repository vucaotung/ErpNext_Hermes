---
# Hermes runs bare-metal on the host, NOT via Docker Compose. This role used
# to assume a Docker deployment (see git history / compose.yaml.j2, removed
# 2026-07-16) but that never matched the real VPS: Hermes is installed via
# its own installer into a venv at {{ hermes_venv_root }}, and each profile
# is its own long-running "gateway run" process. Confirmed live on
# 173.249.51.69 by inspecting the actual running processes before writing
# this role - do not reintroduce a Docker-based template here without
# re-verifying against a real deployment first.
#
# This role does NOT install Hermes itself (the binary/venv). That is a
# manual, one-time prerequisite - see docs/OPERATIONS.md. The live install
# reports "Install method: git" with a locally carried commit on top of
# upstream (hermes --version), which this role has no way to reproduce
# safely without knowing what that patch contains; automating it here would
# risk silently overwriting a deliberate local fix. Treat "Hermes is
# installed and hermes --version works" as a precondition of this role.

- name: Create Hermes env-file root directory
  ansible.builtin.file:
    path: "{{ hermes_root }}"
    state: directory
    owner: "{{ platform_user }}"
    group: "{{ platform_group }}"
    mode: "0750"

- name: Create HERMES_HOME state directory for each enabled profile
  ansible.builtin.file:
    path: "{{ hermes_state_root }}/{{ item.name }}"
    state: directory
    owner: root
    group: root
    mode: "0700"
  loop: "{{ hermes_profiles }}"
  loop_control:
    label: "{{ item.name }}"
  when: item.enabled | default(true)

- name: Create per-profile env-file directory
  ansible.builtin.file:
    path: "{{ hermes_root }}/{{ item.name }}"
    state: directory
    owner: root
    group: root
    mode: "0700"
  loop: "{{ hermes_profiles }}"
  loop_control:
    label: "{{ item.name }}"
  when: item.enabled | default(true)

- name: Render Hermes profile environment files
  ansible.builtin.template:
    src: profile.env.j2
    dest: "{{ hermes_root }}/{{ item.name }}/.env"
    owner: root
    group: root
    mode: "0600"
  loop: "{{ hermes_profiles }}"
  loop_control:
    label: "{{ item.name }}"
  when: item.enabled | default(true)
  no_log: true
  notify: Restart Hermes profiles

- name: Render Hermes profile configuration
  ansible.builtin.template:
    src: config.yaml.j2
    dest: "{{ hermes_state_root }}/{{ item.name }}/config.yaml"
    owner: root
    group: root
    mode: "0600"
  loop: "{{ hermes_profiles }}"
  loop_control:
    label: "{{ item.name }}"
  when: item.enabled | default(true)
  notify: Restart Hermes profiles

- name: Check for extra plugin/hook/cron files shipped for this profile
  ansible.builtin.stat:
    path: "{{ role_path }}/files/profiles/{{ item.name }}"
  loop: "{{ hermes_profiles }}"
  loop_control:
    label: "{{ item.name }}"
    loop_var: item
  delegate_to: localhost
  become: false
  register: hermes_profile_files_stat
  when: item.enabled | default(true)

- name: Copy profile-specific plugins/hooks/scripts (erpnext-identity, cron jobs, etc.)
  ansible.posix.synchronize:
    src: "{{ role_path }}/files/profiles/{{ item.item.name }}/"
    dest: "{{ hermes_state_root }}/{{ item.item.name }}/"
    recursive: true
    rsync_opts:
      - "--exclude=__pycache__"
      - "--exclude=*.pyc"
  loop: "{{ hermes_profile_files_stat.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  when: item.stat.exists | default(false)
  notify: Restart Hermes profiles

- name: Render per-profile systemd unit
  ansible.builtin.template:
    src: hermes-gateway.service.j2
    dest: "/etc/systemd/system/hermes-gateway-{{ item.name }}.service"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ hermes_profiles }}"
  loop_control:
    label: "{{ item.name }}"
  when: item.enabled | default(true)
  register: hermes_unit_files
  notify: Reload systemd

- name: Flush handlers so unit changes are picked up before enabling
  ansible.builtin.meta: flush_handlers

- name: Enable and start each Hermes profile gateway
  ansible.builtin.systemd:
    name: "hermes-gateway-{{ item.name }}.service"
    enabled: true
    state: started
    daemon_reload: true
  loop: "{{ hermes_profiles }}"
  loop_control:
    label: "{{ item.name }}"
  when: item.enabled | default(true)

- name: Disable/stop gateway units for profiles that are no longer enabled
  ansible.builtin.systemd:
    name: "hermes-gateway-{{ item.name }}.service"
    enabled: false
    state: stopped
  loop: "{{ hermes_profiles }}"
  loop_control:
    label: "{{ item.name }}"
  when: not (item.enabled | default(true))
  failed_when: false

# --- Hermes dashboard ("hermes serve") ---------------------------------
# This is a single process shared across all profiles (not part of the
# hermes_profiles loop above). Confirmed live on 173.249.51.69: it existed
# only as a hand-created systemd unit, never captured in this repo, until
# 2026-07-24 when it was also put behind Caddy on hermes_dashboard_domain
# for remote access (see roles/caddy/templates/Caddyfile.j2) instead of the
# previous IP-whitelisted-firewall-rule approach, which broke every time the
# admin travelled and got a new IP.

- name: Render Hermes dashboard systemd unit
  ansible.builtin.template:
    src: hermes-serve.service.j2
    dest: /etc/systemd/system/hermes-serve.service
    owner: root
    group: root
    mode: "0644"
  when: hermes_dashboard_port is defined
  notify: Reload systemd

- name: Flush handlers so the dashboard unit change is picked up before enabling
  ansible.builtin.meta: flush_handlers

- name: Enable and start Hermes dashboard
  ansible.builtin.systemd:
    name: hermes-serve.service
    enabled: true
    state: started
    daemon_reload: true
  when: hermes_dashboard_port is defined
